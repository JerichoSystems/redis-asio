version: 2.1

# Reusable parameters
parameters:
  build_type:
    type: string
    default: Debug
    enum: [Debug, Release]
  store_artifacts:
    type: boolean
    default: true
executors:
  linux:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    environment:
      CMAKE_GENERATOR: Ninja
      VCPKG_FEATURE_FLAGS: manifests,binarycaching
      VCPKG_MANIFEST_FEATURES: tests;examples;benchmarks
      VCPKG_OVERLAY_PORTS: /home/circleci/project/overlay-ports
      VCPKG_BINARY_SOURCES: "clear;files,/home/circleci/.vcpkg-cache,readwrite"
  # macos:
  macos:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    environment:
      CMAKE_GENERATOR: Ninja
      VCPKG_FEATURE_FLAGS: manifests,binarycaching
      VCPKG_OVERLAY_PORTS: /Users/distiller/project/overlay-ports
      VCPKG_MANIFEST_FEATURES: tests;examples;benchmarks
      VCPKG_BINARY_SOURCES: "clear;files,/Users/distiller/.vcpkg-cache,readwrite"

commands:
  install_tooling_linux:
    steps:
      - run:
          name: Install build tools
          command: |
            sudo apt-get update
            sudo apt-get install -y git cmake ninja-build ccache pkg-config curl zip unzip \
              python3 python3-pip redis-tools linux-libc-dev lcov gcovr openssl
            docker version || (sudo service docker start && docker version)
  install_tooling_macos:
    steps:
      - run:
          name: Install build tools
          command: |
            brew update
            brew install cmake ninja ccache

  fetch_bootstrap_vcpkg:
    parameters:
      vcpkg_dir:
        type: string
        default: vcpkg
    steps:
      # - restore_cache:
      #     name: Restore vcpkg git cache
      #     keys:
      #       - v1-vcpkg-git-{{ .Branch }}
      #       - v1-vcpkg-git-
      - run:
          name: Clone vcpkg
          command: |
            VCPKG_BASELINE="$(python3 - \<<'PY'
            import json
            with open("vcpkg-configuration.json", encoding="utf-8") as f:
                print(json.load(f)["default-registry"]["baseline"])
            PY
            )"
            if [ ! -d "<<parameters.vcpkg_dir>>/.git" ]; then
              git clone https://github.com/microsoft/vcpkg.git "<<parameters.vcpkg_dir>>"
            fi
            cd "<<parameters.vcpkg_dir>>"
            git fetch origin --tags --force --prune
            git checkout --detach "$VCPKG_BASELINE"
            ./bootstrap-vcpkg.sh -disableMetrics
      # - save_cache:
      #     name: Cache vcpkg git clone
      #     key: v1-vcpkg-git-{{ .Branch }}
      #     paths:
      #       - <<parameters.vcpkg_dir>>

  restore_vcpkg_cache:
    steps:
      - restore_cache:
          keys:
            - v2-vcpkg-cache-{{ arch }}-{{ .Branch }}-{{ checksum "vcpkg.json" }}-{{ checksum "vcpkg-configuration.json" }}
            - v2-vcpkg-cache-{{ arch }}-{{ .Branch }}
            - v2-vcpkg-cache-{{ arch }}
            - v1-vcpkg-cache-{{ arch }}-{{ .Branch }}
            - v1-vcpkg-cache-{{ arch }}
  save_vcpkg_cache:
    steps:
      - save_cache:
          key: v2-vcpkg-cache-{{ arch }}-{{ .Branch }}-{{ checksum "vcpkg.json" }}-{{ checksum "vcpkg-configuration.json" }}
          paths:
            - ~/.cache/vcpkg
            - ~/.vcpkg-cache
            - vcpkg/downloads
            - vcpkg/installed

  collect_ci_diagnostics:
    steps:
      - run:
          name: Collect CI diagnostics
          when: always
          command: |
            mkdir -p build/ci-diagnostics
            if [ -f build/ctest-results.xml ]; then
              cp build/ctest-results.xml build/ci-diagnostics/ctest-results.xml || true
            fi
            if [ -f build/Testing/Temporary/LastTest.log ]; then
              cp build/Testing/Temporary/LastTest.log build/ci-diagnostics/LastTest.log || true
            fi
            if [ -d vcpkg/buildtrees ]; then
              find vcpkg/buildtrees \( -name '*.log' -o -name '*.out' -o -name '*.err' \) -type f | while IFS= read -r file; do
                safe_name="$(printf '%s' "$file" | tr '/ :' '___')"
                cp "$file" "build/ci-diagnostics/$safe_name" || true
              done
            fi
            if command -v docker >/dev/null 2>&1; then
              docker version > build/ci-diagnostics/docker-version.txt 2>&1 || true
              docker ps -a > build/ci-diagnostics/docker-ps.txt 2>&1 || true
              docker network ls > build/ci-diagnostics/docker-network-ls.txt 2>&1 || true
              for id in $(docker ps -a --filter "name=redis-asio" -q 2>/dev/null); do
                docker logs "$id" > "build/ci-diagnostics/docker-$id.log" 2>&1 || true
              done
            fi
      - store_test_results:
          path: build
      - store_artifacts:
          path: build/ci-diagnostics
          when: always
      - store_artifacts:
          path: build/Testing
          when: always

  restore_ccache:
    steps:
      - restore_cache:
          keys:
            - v1-ccache-{{ arch }}-{{ .Branch }}
            - v1-ccache-{{ arch }}
      - run: ccache --zero-stats || true
  save_ccache:
    steps:
      - run: ccache --show-stats || true
      - save_cache:
          key: v1-ccache-{{ arch }}-{{ .Branch }}
          paths:
            - ~/.ccache

jobs:
  linux-build:
    executor: linux
    parameters:
      build_type:
        type: string
        default: Debug
        enum: [Debug, Release]
    steps:
      - checkout
      - install_tooling_linux
      - fetch_bootstrap_vcpkg
      - restore_vcpkg_cache
      - restore_ccache

      - run:
          name: vcpkg install (manifest)
          command: |
            export VCPKG_ROOT="$PWD/vcpkg"
            export VCPKG_MANIFEST_FEATURES="tests;examples;benchmarks"
            export VCPKG_OVERLAY_PORTS="${VCPKG_OVERLAY_PORTS}"
            "$VCPKG_ROOT"/vcpkg install
      - save_vcpkg_cache
      - run:
          name: Configure (CMake)
          command: |
            # turn SAN on only for Debug
            SAN=$([[ "<< parameters.build_type >>" == "Debug" ]] && echo ON || echo OFF)
            COV=$([[ "<< parameters.build_type >>" == "Debug" ]] && echo ON || echo OFF)
            echo "Sanitizers: ${SAN}"
            echo "Coverage: ${COV}"

            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=<< parameters.build_type >> \
              -DREDIS_ASIO_BUILD_TESTS=ON \
              -DREDIS_ASIO_BUILD_EXAMPLES=ON \
              -DREDIS_ASIO_SANITIZE=${SAN} \
              -DREDIS_ASIO_ENABLE_COVERAGE=${COV} \
              -DVCPKG_MANIFEST_FEATURES="${VCPKG_MANIFEST_FEATURES}" \
              -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT:-$PWD/vcpkg}/scripts/buildsystems/vcpkg.cmake"
      - run: cmake --build build -j
      - run:
          name: Run tests
          command: ctest --test-dir build --output-on-failure -j 2 --output-junit build/ctest-results.xml
      - collect_ci_diagnostics
      - when:
          condition:
            equal: ["<< parameters.build_type >>", "Debug"]
          steps:
            - run:
                name: Generate coverage report
                command: |
                  mkdir -p build/coverage && gcovr \
                    --root "$PWD" \
                    --object-directory build \
                    --filter "$PWD" \
                    --exclude "$PWD/tests/.*" \
                    --exclude "$PWD/benchmarks/.*" \
                    --exclude "$PWD/examples/.*" \
                    --exclude "$PWD/build/.*" \
                    --exclude '.*/vcpkg_installed/.*' \
                    --xml build/coverage/coverage.xml \
                    --html-details build/coverage/index.html \
                    --print-summary > build/coverage/summary.txt
            - store_artifacts:
                path: build/coverage/index.html
                when: always
            - store_artifacts:
                path: build/coverage/coverage.xml
                when: always
            - store_artifacts:
                path: build/coverage/summary.txt
                when: always
      - save_ccache
  macos-build:
    executor: macos
    parameters:
      build_type:
        type: string
        default: Debug
        enum: [Debug, Release]
    steps:
      - checkout
      - install_tooling_macos
      - fetch_bootstrap_vcpkg
      - restore_vcpkg_cache
      - restore_ccache
      - run:
          name: vcpkg install (manifest)
          command: |
            export VCPKG_ROOT="$PWD/vcpkg"
            export VCPKG_MANIFEST_FEATURES="tests;examples;benchmarks"
            export VCPKG_OVERLAY_PORTS="${VCPKG_OVERLAY_PORTS}"
            "$VCPKG_ROOT"/vcpkg install
      - save_vcpkg_cache
      - run:
          name: Configure CMake
          command: |
            cmake -S . -B build \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=<< parameters.build_type >> \
              -DREDIS_ASIO_BUILD_TESTS=ON \
              -DREDIS_ASIO_BUILD_EXAMPLES=ON \
              -DREDIS_ASIO_SANITIZE=OFF \
              -DVCPKG_MANIFEST_FEATURES="${VCPKG_MANIFEST_FEATURES}" \
              -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - run: cmake --build build -j
      - run:
          name: Run unit tests
          command: ctest --test-dir build --output-on-failure -j 2 --output-junit build/ctest-results.xml
      - collect_ci_diagnostics
      - when:
          condition:
            equal: ["<< parameters.build_type >>", "Debug"]
          steps:
            - run:
                name: Generate coverage report
                command: |
                  python3 -m pip install --user gcovr
                  mkdir -p build/coverage
                  ~/.local/bin/gcovr \
                    --root "$PWD" \
                    --object-directory build \
                    --filter "$PWD" \
                    --exclude "$PWD/tests/.*" \
                    --exclude "$PWD/benchmarks/.*" \
                    --exclude "$PWD/examples/.*" \
                    --exclude "${PWD}/build/.*" \
                    --exclude '.*/vcpkg_installed/.*' \
                    --xml build/coverage/coverage.xml \
                    --html-details build/coverage/index.html \
                    --print-summary > build/coverage/summary.txt
            - store_artifacts:
                path: build/coverage/index.html
                when: always
            - store_artifacts:
                path: build/coverage/coverage.xml
                when: always
            - store_artifacts:
                path: build/coverage/summary.txt
                when: always
      - save_ccache

  linux-sanitizers:
    executor: linux
    steps:
      - checkout
      - install_tooling_linux
      - fetch_bootstrap_vcpkg
      - restore_vcpkg_cache

      - run:
          name: vcpkg install (tests feature only)
          command: |
            export VCPKG_ROOT="$PWD/vcpkg"
            export VCPKG_MANIFEST_FEATURES="tests;examples;benchmarks"
            export VCPKG_OVERLAY_PORTS="${VCPKG_OVERLAY_PORTS}"
            # If you want to trim features for this job, you can add a minimal smoke vcpkg.json; otherwise:
            "$VCPKG_ROOT"/vcpkg install
      - save_vcpkg_cache
      - run:
          name: Configure with ASan/UBSan
          command: |
            cmake -S . -B build \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DREDIS_ASIO_BUILD_TESTS=ON \
              -DREDIS_ASIO_BUILD_EXAMPLES=OFF \
              -DREDIS_ASIO_SANITIZE=ON \
              -DVCPKG_MANIFEST_FEATURES="${VCPKG_MANIFEST_FEATURES}" \
              -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - run: cmake --build build -j
      - run:
          name: Run tests under sanitizers
          command: |
            UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 \
            ASAN_OPTIONS=detect_leaks=1:strict_string_checks=1:check_initialization_order=1 \
            ctest --test-dir build --output-on-failure -j 2 --output-junit build/ctest-results.xml
      - collect_ci_diagnostics

  port-smoke-overlay-linux:
    executor: linux
    steps:
      - checkout
      - install_tooling_linux
      - fetch_bootstrap_vcpkg
      - restore_vcpkg_cache
      - run:
          name: Smoke consumer builds redis-asio overlay
          command: |
            mkdir -p smoke && cd smoke
            cp ../vcpkg-configuration.json .
            ln -s ../overlay-ports overlay-ports
            cat > vcpkg.json \<<'JSON'
            {
              "name": "smoke",
              "version-string": "0",
              "dependencies": [
                { "name": "redis-asio", "default-features": true, "features": [ "tests", "examples", "benchmarks" ] }
              ]
            }
            JSON
            export VCPKG_ROOT="$PWD/../vcpkg"
            "$VCPKG_ROOT"/vcpkg install --overlay-ports="${CIRCLE_WORKING_DIRECTORY}/overlay-ports"
      - collect_ci_diagnostics
      - save_vcpkg_cache
  port-smoke-overlay-macos:
    executor: macos
    steps:
      - checkout
      - install_tooling_macos
      - fetch_bootstrap_vcpkg
      - restore_vcpkg_cache
      - run:
          name: Smoke consumer builds redis-asio overlay
          command: |
            mkdir -p smoke && cd smoke
            cp ../vcpkg-configuration.json .
            ln -s ../overlay-ports overlay-ports
            cat > vcpkg.json \<<'JSON'
            {
              "name": "smoke",
              "version-string": "0",
              "dependencies": [
                { "name": "redis-asio", "default-features": true, "features": [ "tests", "examples", "benchmarks" ] }
              ]
            }
            JSON
            export VCPKG_ROOT="$PWD/../vcpkg"
            "$VCPKG_ROOT"/vcpkg install --overlay-ports="${CIRCLE_WORKING_DIRECTORY}/overlay-ports"
      - collect_ci_diagnostics
      - save_vcpkg_cache

workflows:
  ci:
    jobs:
      - linux-build:
          name: Linux • Debug
          build_type: Debug
      - linux-build:
          name: Linux • Release
          build_type: Release
      - macos-build:
          name: macOS • Debug
          build_type: Debug
      # - macos-build:
      #     name: macOS • Release
      #     build_type: Release
      - linux-sanitizers:
          name: Linux • Sanitizers
      - port-smoke-overlay-linux:
          name: Port smoke (overlay) for linux
      - port-smoke-overlay-macos:
          name: Port smoke (overlay) for macos
